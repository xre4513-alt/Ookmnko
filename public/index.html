        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 5px; font-size: 16px; }
        button { background: #4CAF50; color: white; cursor: pointer; }
        button:hover { background: #45a049; }
        button:disabled { background: #666; cursor: not-allowed; }
        .message { background: #2c2c2c; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .my-message { background: #4CAF50; text-align: right; }
        #chatArea, #usersArea { display: none; }
        #messages { height: 400px; overflow-y: auto; margin: 10px 0; }
        .error { color: #ff6b6b; margin: 10px 0; padding: 10px; background: #2c2c2c; border-radius: 5px; }
        .success { color: #51cf66; margin: 10px 0; padding: 10px; background: #2c2c2c; border-radius: 5px; }
        .user-list { margin: 10px 0; }
        .user-item { background: #2c2c2c; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; }
        .user-item:hover { background: #3c3c3c; }
        .selected { background: #4CAF50; }
        .tab { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab button { background: #333; flex: 1; }
        .tab button.active { background: #4CAF50; }

    <div class="container" id="loginArea">
        <h2>📱 5-Digit ID Messenger</h2>

        <input type="password" id="regPassword" placeholder="Password">
        <button onclick="register()" id="regBtn">📝 Register</button>

        <h3>Login Existing Account</h3>
        <input type="text" id="loginId" placeholder="5-digit ID">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()" id="loginBtn">🔐 Login</button>
    </div>

        <div class="tab">
            <button onclick="showTab('users')" id="tabUsers">👥 All Users</button>
            <button onclick="showTab('chat')" id="tabChat">💬 Chat</button>

    </div>

            if (div) {
                div.innerHTML = `<div class="${type}">${msg}</div>`;
                setTimeout(() => div.innerHTML = '', 3000);
            }
        }

            const name = document.getElementById('regName').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || !password) {
                showMessage('❌ Please enter both name and password', 'error');
                return;
            }
            
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = 'Registering...';
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });
                
                const data = await res.json();
                console.log('Register response:', data);
                
                if (data.success) {
                    showMessage(`✅ Success! Your 5-digit ID is: ${data.uniqueId}. Save this number!`, 'success');

                    document.getElementById('regPassword').value = '';
                } else {

                showMessage('❌ Network error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '📝 Register';
            }
        }

            const uniqueId = document.getElementById('loginId').value.trim();

                return;

                    body: JSON.stringify({ uniqueId, password })

                alert('❌ Network error: ' + err.message);
            } finally {

            }
        }

            const token = localStorage.getItem('token');
            socket = io({
                auth: { token },
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                console.log('Socket connected');

                if (selectedUser && selectedUser.uniqueId === msg.fromId) {
                    displayMessage(msg.fromId, msg.message, false);
                }
            });
            
            socket.on('connect_error', (err) => {
                console.log('Socket error:', err.message);
            });
        }

        async function loadAllUsers() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/all-users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                allUsers = users.filter(u => u.uniqueId !== currentUser.uniqueId);
                displayUsersList();
            } catch (err) {
                console.log('Error loading users:', err);
            }
        }

            const container = document.getElementById('usersList');
            if (!container) return;
            
            if (allUsers.length === 0) {
                container.innerHTML = '<p>No other users found. Share this app with friends!</p>';
                return;

                    <strong>${user.name}</strong><br>
                    <small>ID: ${user.uniqueId}</small>
                </div>
            `).join('');

            });
        }

        function displayMessage(senderId, message, isMine) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isMine ? 'my-message' : ''}`;
            const sender = isMine ? 'You' : (allUsers.find(u => u.uniqueId === senderId)?.name || senderId);
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${message}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTab(tab) {
            if (tab === 'users') {
                document.getElementById('usersArea').style.display = 'block';
                document.getElementById('chatArea').style.display = 'none';
                document.getElementById('tabUsers').classList.add('active');
                document.getElementById('tabChat').classList.remove('active');
                loadAllUsers();
            } else {
                document.getElementById('usersArea').style.display = 'none';
                document.getElementById('chatArea').style.display = 'block';
                document.getElementById('tabChat').classList.add('active');
                document.getElementById('tabUsers').classList.remove('active');
                if (selectedUser) loadChatHistory();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            if (socket) socket.disconnect();
            location.reload();
        }
    </script>
</body>
</html>
